version: "3.9"

services:
  rigging:
    build: .
    ports:
      - "8001:8001"
    environment:
      - RIGGING_GPU_ENABLED=${RIGGING_GPU_ENABLED:-true}
      - RIGGING_CPU_FALLBACK=${RIGGING_CPU_FALLBACK:-true}
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
