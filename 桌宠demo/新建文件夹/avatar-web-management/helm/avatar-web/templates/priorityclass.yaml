{{- if .Values.priorityClass.enabled }}
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: {{ include "avatar-web.fullname" . }}
  labels:
    {{- include "avatar-web.labels" . | nindent 4 }}
value: {{ .Values.priorityClass.value | default 1000 }}
globalDefault: false
description: {{ .Values.priorityClass.description | default "avatar-web application pods — higher priority than batch jobs" }}
{{- end }}
