{{- if .Values.externalSecrets.enabled }}
# ExternalSecret — maps AWS Secrets Manager / Vault secrets to K8s secrets
# Requires External Secrets Operator installed in the cluster
# https://external-secrets.io/
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "avatar-web.fullname" . }}
  labels:
    {{- include "avatar-web.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName | default "aws-secretsmanager" }}
    kind: ClusterSecretStore
  target:
    name: {{ include "avatar-web.fullname" . }}
    creationPolicy: Owner
  data:
    # Database credentials
    - secretKey: DATABASE_URL
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix | default "/avatar-web/production" }}/database
        property: url
    # JWT private key
    - secretKey: JWT_PRIVATE_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix | default "/avatar-web/production" }}/jwt
        property: privateKey
    # JWT public key
    - secretKey: JWT_PUBLIC_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix | default "/avatar-web/production" }}/jwt
        property: publicKey
    # JWT secret (HS256 fallback)
    - secretKey: JWT_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix | default "/avatar-web/production" }}/jwt
        property: secret
    # Pet encryption key
    - secretKey: PET_ENCRYPTION_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix | default "/avatar-web/production" }}/pet
        property: encryptionKey
    # Redis connection
    - secretKey: REDIS_HOST
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix | default "/avatar-web/production" }}/redis
        property: host
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix | default "/avatar-web/production" }}/redis
        property: password
{{- end }}
