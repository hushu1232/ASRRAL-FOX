# ModSecurity WAF rules for avatar-web nginx ingress
# Applied via: nginx.ingress.kubernetes.io/modsecurity-snippet annotation
# OWASP CRS is assumed to be loaded by the nginx ingress controller
# Custom rules below target avatar-web specific attack surfaces.

SecRuleEngine On
SecRequestBodyLimit 104857600
SecRequestBodyNoFilesLimit 10485760

# --- Whitelist internal health/metrics probes ---
SecRule REQUEST_URI "^/api/health$" "id:10001,phase:1,pass,nolog,ctl:ruleEngine=Off"
SecRule REQUEST_URI "^/api/metrics$" "id:10002,phase:1,pass,nolog,ctl:ruleEngine=Off"
SecRule REQUEST_URI "^/.well-known/" "id:10003,phase:1,pass,nolog,ctl:ruleEngine=Off"

# --- Block common attack paths ---
SecRule REQUEST_URI "@contains .env" "id:10100,phase:1,deny,status:403,msg:'Env file probing'"
SecRule REQUEST_URI "@contains wp-admin" "id:10101,phase:1,deny,status:403,msg:'WordPress probe'"
SecRule REQUEST_URI "@contains wp-login" "id:10102,phase:1,deny,status:403,msg:'WordPress probe'"
SecRule REQUEST_URI "@contains /phpmyadmin" "id:10103,phase:1,deny,status:403,msg:'phpMyAdmin probe'"
SecRule REQUEST_URI "@contains /phpunit" "id:10104,phase:1,deny,status:403,msg:'PHPUnit probe'"
SecRule REQUEST_URI "@contains /.git/" "id:10105,phase:1,deny,status:403,msg:'Git exposure probe'"
SecRule REQUEST_URI "@contains /.svn/" "id:10106,phase:1,deny,status:403,msg:'SVN exposure probe'"
SecRule REQUEST_URI "@contains /vendor/" "id:10107,phase:1,deny,status:403,msg:'Composer vendor probe'"
SecRule REQUEST_URI "@contains /node_modules/" "id:10108,phase:1,deny,status:403,msg:'Node modules probe'"
SecRule REQUEST_URI "@contains /actuator" "id:10109,phase:1,deny,status:403,msg:'Spring actuator probe'"
SecRule REQUEST_URI "@contains /druid/" "id:10110,phase:1,deny,status:403,msg:'Druid monitor probe'"

# --- Protect admin routes from excessive requests ---
SecRule REQUEST_URI "^/api/admin/" \
  "id:10200,phase:1,pass,setvar:ip.admin_hit=+1,expirevar:ip.admin_hit=60"

SecRule IP:ADMIN_HIT "@gt 30" \
  "id:10201,phase:1,deny,status:429,msg:'Admin rate limit exceeded'"

# --- SQL injection in query params (supplement to OWASP CRS) ---
SecRule ARGS "@detectSQLi" \
  "id:10300,phase:2,deny,status:403,msg:'SQLi detected in query params',log"

# --- XSS in request body ---
SecRule REQUEST_BODY "@detectXSS" \
  "id:10301,phase:2,deny,status:403,msg:'XSS detected in request body',log"

# --- Block oversized requests ---
SecRule REQUEST_BODY_LENGTH "@gt 104857600" \
  "id:10400,phase:1,deny,status:413,msg:'Request body too large (>100MB)'"

# --- Method whitelist ---
SecRule REQUEST_METHOD "!@rx ^(GET|HEAD|POST|PUT|DELETE|PATCH|OPTIONS)$" \
  "id:10500,phase:1,deny,status:405,msg:'Method not allowed'"

# --- Strict Content-Type on POST/PUT/PATCH /api routes ---
SecRule REQUEST_URI "^/api/" \
  "chain,id:10600,phase:2,deny,status:415,msg:'Missing Content-Type on API request'"
  SecRule REQUEST_METHOD "@rx ^(POST|PUT|PATCH)$" "chain"
    SecRule REQUEST_HEADERS:Content-Type "!@rx ^application/(json|x-www-form-urlencoded|octet-stream|vnd\.api\+json)" "chain"
      SecRule REQUEST_URI "!@contains /upload" "chain"
        SecRule REQUEST_URI "!@contains /assets"

# --- User-Agent required on API requests ---
SecRule REQUEST_URI "^/api/" \
  "chain,id:10700,phase:2,deny,status:400,msg:'Missing User-Agent on API request'"
  SecRule REQUEST_HEADERS:User-Agent "^$"

# --- Block known malicious User-Agents ---
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(sqlmap|nikto|nmap|masscan|zgrab|gobuster|dirbuster|hydra|burpsuite|acunetix|netsparker|appscan)" \
  "id:10701,phase:2,deny,status:403,msg:'Known scanner User-Agent blocked'"

# --- OAuth endpoints — strict redirect_uri validation ---
SecRule REQUEST_URI "^/api/oauth/authorize" \
  "chain,id:10800,phase:2,pass"
  SecRule ARGS:redirect_uri "!@rx ^https?://[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}" \
    "deny,status:400,msg:'OAuth redirect_uri must be absolute HTTPS URL'"

# --- CSP report endpoint — disable body inspection ---
SecRule REQUEST_URI "^/api/csp-report$" \
  "id:10900,phase:1,pass,nolog,ctl:requestBodyAccess=Off"
