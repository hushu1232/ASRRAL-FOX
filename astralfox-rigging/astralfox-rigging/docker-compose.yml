version: "3.8"

services:
  # API server (rigging pipeline)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./output:/app/output
      - ./models:/app/models
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Gradio UI (optional)
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7860:7860"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - API_BASE=http://api:8001
    command: ["python", "-m", "ui.app"]
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
