version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: astralfox
      POSTGRES_USER: astralfox
      POSTGRES_PASSWORD: ${DB_PASSWORD:-astralfox_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astralfox"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js Web Management ──────────────────────────────────
  web:
    build:
      context: ./avatar-web-management
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://astralfox:${DB_PASSWORD:-astralfox_dev}@postgres:5432/astralfox
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me}
      PET_ENCRYPTION_KEY: ${PET_ENCRYPTION_KEY:-dev-encryption-key-change-me}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Python BFF (AI Gateway) ─────────────────────────────────
  bff:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      AZURE_SPEECH_KEY: ${AZURE_SPEECH_KEY:-}
      AZURE_SPEECH_REGION: ${AZURE_SPEECH_REGION:-eastasia}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      TTS_PROVIDER: ${TTS_PROVIDER:-edge}
      QWEATHER_API_KEY: ${QWEATHER_API_KEY:-}
      BING_SEARCH_API_KEY: ${BING_SEARCH_API_KEY:-}
      FFMPEG_PATH: /usr/bin/ffmpeg
    ports:
      - "8765:8765"

volumes:
  pgdata:
